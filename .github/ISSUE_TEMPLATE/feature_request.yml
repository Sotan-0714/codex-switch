name: Feature request
description: Suggest an improvement for Apivot
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Codex profile switching
        - Claude Code profile switching
        - Third-party API adapters
        - Backups and restore
        - Usage statistics
        - Chat records
        - Packaging
        - UI
        - Other
    validations:
      required: true
