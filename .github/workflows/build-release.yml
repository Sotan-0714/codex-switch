name: Build Apivot

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows:
    name: Windows portable and setup
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run legal:notices
      - run: npm run build:renderer
      - run: npx electron-builder --win portable nsis --x64 --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
      - name: Generate SHA-256 checksums
        shell: pwsh
        run: |
          Get-ChildItem dist -File | Where-Object { $_.Extension -in ".exe", ".zip", ".dmg" } | ForEach-Object {
            $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $_.FullName).Hash.ToLowerInvariant()
            "$hash  $($_.Name)" | Set-Content -LiteralPath "$($_.FullName).sha256.txt" -Encoding utf8
          }
      - uses: actions/upload-artifact@v4
        with:
          name: apivot-windows
          path: |
            dist/*.exe
            dist/*.sha256.txt
            dist/*release-notes.txt
      - name: Upload Windows assets to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            dist/*.sha256.txt

  macos:
    name: macOS DMG and ZIP
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run legal:notices
      - run: npm run build:renderer
      - run: npx electron-builder --mac dmg zip --x64 --arm64 --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
      - name: Generate SHA-256 checksums
        shell: bash
        run: |
          find dist -maxdepth 1 -type f \( -name "*.dmg" -o -name "*.zip" \) -print0 |
            while IFS= read -r -d '' file; do
              shasum -a 256 "$file" | awk -v name="$(basename "$file")" '{print $1 "  " name}' > "$file.sha256.txt"
            done
      - uses: actions/upload-artifact@v4
        with:
          name: apivot-macos
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.sha256.txt
            dist/*.blockmap
      - name: Upload macOS assets to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.dmg
            dist/*.zip
            dist/*.sha256.txt
